<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: sans-serif;
    font-size: 13px;
    color: #333;
    padding: 10px;
    margin: 0;
    background: transparent;
  }
  .section-title {
    font-weight: bold;
    color: #c8830a;
    font-size: 14px;
    margin-bottom: 8px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 4px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .stat-label { color: #666; }
  .stat-value { font-weight: bold; color: #333; }
  .loading { color: #999; font-style: italic; }
  .disclaimer {
    font-size: 11px;
    color: #aaa;
    margin-top: 10px;
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="content">
  <div class="loading">Select a site to load incentive data...</div>
</div>

<script>
  function getUrlParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  var lat = getUrlParam("lat");
  var lon = getUrlParam("lon");

  if (lat && lon) {
    loadIncentiveData(parseFloat(lat), parseFloat(lon));
  }

  function loadIncentiveData(lat, lon) {
    document.getElementById("content").innerHTML =
      '<div class="loading">Loading incentive data...</div>';

    var fccUrl = "https://geo.fcc.gov/api/census/block/find?latitude=" +
      lat + "&longitude=" + lon + "&format=json";

    fetch(fccUrl)
      .then(function(r) { return r.json(); })
      .then(function(fcc) {
        var stateFIPS  = fcc.State.FIPS;
        var countyFIPS = fcc.County.FIPS.substring(2);
        var tractFIPS  = fcc.Block.FIPS.substring(5, 11);
        var stateName  = fcc.State.name;

        var hubzoneUrl = "https://maps.certify.sba.gov/api/hubzone.json?lat=" +
          lat + "&long=" + lon;

        var tractUrl = "https://api.census.gov/data/2022/acs/acs5" +
          "?get=B17001_002E,B17001_001E" +
          "&for=tract:" + tractFIPS +
          "&in=state:" + stateFIPS +
          "&in=county:" + countyFIPS;

        var hubPromise = fetch(hubzoneUrl)
          .then(function(r) { return r.json(); })
          .catch(function() { return null; });

        var tractPromise = fetch(tractUrl)
          .then(function(r) { return r.json(); })
          .catch(function() { return null; });

        return Promise.all([hubPromise, tractPromise])
          .then(function(results) {
            displayData(results[0], results[1], stateName);
          });
      })
      .catch(function(err) {
        document.getElementById("content").innerHTML =
          '<div class="loading">Could not load incentive data.</div>';
        console.error(err);
      });
  }

  function badge(val) {
    if (val === "yes") return '<span style="color:#333;">&#10004; Yes</span>';
    if (val === "no")  return '<span style="color:#333;">&#10006; No</span>';
    return '<span style="color:#999;">— Unknown</span>';
  }

  function displayData(hubData, tractData, stateName) {

    var hubzone = "unknown";
    if (hubData && hubData.hubzone) {
      hubzone = hubData.hubzone === "Y" ? "yes" : "no";
    }

    var povertyRate = "N/A";
    var povertyNum  = 0;
    if (tractData && tractData[1]) {
      var poor  = Number(tractData[1][0]);
      var total = Number(tractData[1][1]);
      if (total > 0) {
        povertyNum  = (poor / total) * 100;
        povertyRate = povertyNum.toFixed(1) + "%";
      }
    }

    var ozIndicator = povertyNum >= 20 ? "yes" : "no";

    var stateIncentivesUrl =
      "https://www.google.com/search?q=" +
      stateName.replace(/ /g, "+") +
      "+state+industrial+development+incentives+tax+credits";

    document.getElementById("content").innerHTML =
      '<div class="section-title">💼 Investment Incentives</div>' +

      '<div class="stat-row">' +
        '<span class="stat-label">🏛️ HUBZone Designated</span>' +
        '<span class="stat-value">' + badge(hubzone) + '</span>' +
      '</div>' +

      '<div class="stat-row">' +
        '<span class="stat-label">🏦 Opportunity Zone (Est.)</span>' +
        '<span class="stat-value">' + badge(ozIndicator) + '</span>' +
      '</div>' +

      '<div class="stat-row">' +
        '<span class="stat-label">📉 Tract Poverty Rate</span>' +
        '<span class="stat-value">' + povertyRate + '</span>' +
      '</div>' +

      '<div style="margin-top:10px;text-align:center;">' +
        '<a href="' + stateIncentivesUrl + '" target="_blank" ' +
        'style="color:#c8830a;font-size:12px;text-decoration:none;">' +
        '🔗 View ' + stateName + ' Incentives Guide</a>' +
      '</div>' +

      '<div class="disclaimer">' +
        '⚠️ HUBZone and OZ status are estimates based on public APIs.<br>' +
        'Verify with SBA and CDFI Fund before making investment decisions.' +
      '</div>';
  }
</script>
</body>
</html>
