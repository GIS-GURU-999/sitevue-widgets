<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: sans-serif;
    font-size: 13px;
    color: #333;
    padding: 10px;
    margin: 0;
    background: transparent;
  }
  .section-title {
    font-weight: bold;
    color: #c8830a;
    font-size: 14px;
    margin-bottom: 8px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 4px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .stat-label { color: #666; }
  .stat-value { font-weight: bold; color: #333; }
  .loading { color: #999; font-style: italic; }
  .disclaimer {
    font-size: 11px;
    color: #aaa;
    margin-top: 10px;
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="content">
  <div class="loading">Select a site to load workforce data...</div>
</div>

<script>
  function getUrlParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  var lat = getUrlParam("lat");
  var lon = getUrlParam("lon");

  if (lat && lon) {
    loadWorkforceData(parseFloat(lat), parseFloat(lon));
  }

  function loadWorkforceData(lat, lon) {
    document.getElementById("content").innerHTML =
      '<div class="loading">⏳ Loading workforce data...</div>';

    // Step 1 — FCC API to get FIPS codes
    var fccUrl = "https://geo.fcc.gov/api/census/block/find?latitude=" +
      lat + "&longitude=" + lon + "&format=json";

    fetch(fccUrl)
      .then(function(r) { return r.json(); })
      .then(function(fcc) {
        var stateFIPS  = fcc.State.FIPS;
        var countyFIPS = fcc.County.FIPS.substring(2);
        var countyName = fcc.County.name;
        var stateName  = fcc.State.name;

        // Step 2 — Census ACS workforce variables
        var censusUrl = "https://api.census.gov/data/2022/acs/acs5" +
          "?get=C24030_006E,C24030_048E,B19301_001E,B25077_001E,B23025_002E" +
          "&for=county:" + countyFIPS +
          "&in=state:" + stateFIPS;

        return fetch(censusUrl)
          .then(function(r) { return r.json(); })
          .then(function(census) {
            displayData(census, countyName, stateName);
          });
      })
      .catch(function(err) {
        document.getElementById("content").innerHTML =
          '<div class="loading">⚠️ Could not load data.</div>';
        console.error(err);
      });
  }

  function displayData(census, countyName, stateName) {
    var headers = census[0];
    var values  = census[1];

    var d = {};
    headers.forEach(function(h, i) { d[h] = values[i]; });

    // Format values
    var manufacturing  = Number(d["C24030_006E"]).toLocaleString();
    var transportation = Number(d["C24030_048E"]).toLocaleString();
    var perCapitaInc   = "$" + Number(d["B19301_001E"]).toLocaleString();
    var medHomeValue   = "$" + Number(d["B25077_001E"]).toLocaleString();
    var laborForce     = Number(d["B23025_002E"]).toLocaleString();

    // Handle negative/null values
    if (Number(d["C24030_006E"]) < 0) manufacturing  = "N/A";
    if (Number(d["C24030_048E"]) < 0) transportation = "N/A";
    if (Number(d["B19301_001E"]) < 0) perCapitaInc   = "N/A";
    if (Number(d["B25077_001E"]) < 0) medHomeValue   = "N/A";
    if (Number(d["B23025_002E"]) < 0) laborForce     = "N/A";

    document.getElementById("content").innerHTML =
      '<div class="section-title">👷 Workforce & Labor Market</div>' +
      '<div style="color:#c8830a;font-weight:bold;font-size:13px;margin-bottom:8px;">📍 ' + countyName + ', ' + stateName + '</div>' +

      '<div class="stat-row">' +
        '<span class="stat-label">🏭 Manufacturing Workers</span>' +
        '<span class="stat-value">' + manufacturing + '</span>' +
      '</div>' +

      '<div class="stat-row">' +
        '<span class="stat-label">🚛 Transportation Workers</span>' +
        '<span class="stat-value">' + transportation + '</span>' +
      '</div>' +

      '<div class="stat-row">' +
        '<span class="stat-label">💵 Per Capita Income</span>' +
        '<span class="stat-value">' + perCapitaInc + '</span>' +
      '</div>' +

      '<div class="stat-row">' +
        '<span class="stat-label">🏠 Median Home Value</span>' +
        '<span class="stat-value">' + medHomeValue + '</span>' +
      '</div>' +

      '<div class="stat-row">' +
        '<span class="stat-label">👷 Total Labor Force</span>' +
        '<span class="stat-value">' + laborForce + '</span>' +
      '</div>' +

      '<div class="disclaimer">' +
        '⚠️ Data reflects the county in which the site is located.<br>' +
        'Source: US Census Bureau ACS 5-Year Estimates (2022)' +
      '</div>';
  }
</script>
</body>
</html>
