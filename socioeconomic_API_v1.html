<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: sans-serif;
    font-size: 13px;
    color: #333;
    padding: 10px;
    margin: 0;
    background: transparent;
  }
  .county-title {
    font-weight: bold;
    color: #c8830a;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .stat-label { color: #666; }
  .stat-value { font-weight: bold; color: #333; }
  .loading { color: #999; font-style: italic; }
  .disclaimer {
    font-size: 11px;
    color: #aaa;
    margin-top: 10px;
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="content">
  <div class="loading">Select a site on the map to load data...</div>
</div>

<script>
  function getUrlParam(name) {
    var params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  var lat = getUrlParam("lat");
  var lon = getUrlParam("lon");

  if (lat && lon) {
    loadCensusData(parseFloat(lat), parseFloat(lon));
  }

  function loadCensusData(lat, lon) {
    document.getElementById("content").innerHTML =
      '<div class="loading">⏳ Loading socio-economic data...</div>';

    // TIGERweb — State_County layer 1, fields: STATE, COUNTY, BASENAME
    var tigerUrl = "https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/State_County/MapServer/1/query" +
      "?geometry=" + lon + "," + lat +
      "&geometryType=esriGeometryPoint" +
      "&inSR=4326&spatialRel=esriSpatialRelIntersects" +
      "&outFields=STATE,COUNTY,BASENAME" +
      "&returnGeometry=false&f=json";

    fetch(tigerUrl)
      .then(function(res) { return res.json(); })
      .then(function(tiger) {
        if (!tiger.features || tiger.features.length === 0) {
          throw new Error("No county found for coordinates");
        }
        var attrs = tiger.features[0].attributes;
        var stateFIPS  = attrs.STATE;
        var countyFIPS = attrs.COUNTY;
        var countyName = attrs.BASENAME;

        // Census ACS API
        var censusUrl = "https://api.census.gov/data/2022/acs/acs5" +
          "?get=B01003_001E,B19013_001E,B23025_005E,B23025_003E," +
          "B15003_022E,B01002_001E,B11001_001E,NAME" +
          "&for=county:" + countyFIPS +
          "&in=state:" + stateFIPS +
          "&key=6b013bb8beb39ee712fc17783a2373d6857134c5";

        return fetch(censusUrl)
          .then(function(res) { return res.json(); })
          .then(function(census) {
            var nameIdx = census[0].indexOf("NAME");
            var fullName = census[1][nameIdx];
            var parts = fullName.split(", ");
            displayData(census, parts[0], parts[1] || countyName);
          });
      })
      .catch(function(err) {
        document.getElementById("content").innerHTML =
          '<div class="loading">⚠️ Could not load data: ' + err.message + '</div>';
        console.error(err);
      });
  }

  function displayData(census, countyName, stateName) {
    var headers = census[0];
    var values  = census[1];

    var d = {};
    headers.forEach(function(h, i) { d[h] = values[i]; });

    var totalPop   = Number(d["B01003_001E"]).toLocaleString();
    var medIncome  = "$" + Number(d["B19013_001E"]).toLocaleString();
    var laborForce = Number(d["B23025_003E"]);
    var unemployed = Number(d["B23025_005E"]);
    var unempRate  = laborForce > 0
      ? ((unemployed / laborForce) * 100).toFixed(1) + "%"
      : "N/A";
    var bachelors  = Number(d["B15003_022E"]).toLocaleString();
    var medAge     = Number(d["B01002_001E"]).toFixed(1);
    var households = Number(d["B11001_001E"]).toLocaleString();

    document.getElementById("content").innerHTML =
      '<div style="color:#c8830a;font-weight:bold;font-size:14px;margin-bottom:8px;border-bottom:1px solid #ddd;padding-bottom:4px;"><span style="color:#C8830A;">◆</span> Socio-Economic Details</div>' +
      '<div class="county-title"><span style="color:#F5C44A;">●</span> ' + countyName + ', ' + stateName + '</div>' +
      '<div class="stat-row"><span class="stat-label"><span style="color:#D4941A;">■</span> Total Population</span><span class="stat-value">' + totalPop + '</span></div>' +
      '<div class="stat-row"><span class="stat-label"><span style="color:#D4941A;">■</span> Median Household Income</span><span class="stat-value">' + medIncome + '</span></div>' +
      '<div class="stat-row"><span class="stat-label"><span style="color:#D4941A;">■</span> Unemployment Rate</span><span class="stat-value">' + unempRate + '</span></div>' +
      '<div class="stat-row"><span class="stat-label"><span style="color:#D4941A;">■</span> Bachelor\'s Degree Holders</span><span class="stat-value">' + bachelors + '</span></div>' +
      '<div class="stat-row"><span class="stat-label"><span style="color:#D4941A;">■</span> Total Households</span><span class="stat-value">' + households + '</span></div>' +
      '<div class="stat-row"><span class="stat-label"><span style="color:#D4941A;">■</span> Median Age</span><span class="stat-value">' + medAge + '</span></div>' +
      '<div class="disclaimer">⚠️ Data reflects the county in which the site is located.<br>Source: US Census Bureau ACS 5-Year Estimates (2022)</div>';
  }
</script>
</body>
</html>
